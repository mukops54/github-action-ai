name: Deploy DistilBERT to Hugging Face Spaces

on:
  push:
    branches:
      - main

env:
  DOCKER_REPO: 03sarath/distilbert-sentiment

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Pull the real Docker image, run it,
  #         send a real prediction, confirm it works
  # ─────────────────────────────────────────────
  smoke-test:
    name: Model Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read image tag from hf-space/Dockerfile
        id: read-tag
        run: |
          TAG=$(grep '^FROM' hf-space/Dockerfile | awk -F: '{print $2}')
          echo "Image tag to test: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Pull image from Docker Hub
        run: docker pull ${{ env.DOCKER_REPO }}:${{ steps.read-tag.outputs.tag }}

      - name: Start container
        run: |
          docker run -d \
            --name smoke-test \
            -p 7860:7860 \
            ${{ env.DOCKER_REPO }}:${{ steps.read-tag.outputs.tag }}

      - name: Wait for model to load
        run: |
          echo "Waiting for container to be ready..."
          for i in {1..20}; do
            if curl -sf http://localhost:7860/health; then
              echo ""
              echo "Container is ready!"
              break
            fi
            echo "Attempt $i/20 — retrying in 15 seconds..."
            sleep 15
          done

      - name: Run smoke test on predict endpoint
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:7860/predict \
            -H "Content-Type: application/json" \
            -d '{"text": "The weather today is absolutely wonderful!"}')
          echo "Model response: $RESPONSE"
          python3 -c "
          import sys, json
          data = json.loads('$RESPONSE')
          assert 'label' in data, 'Missing label field'
          assert 'score' in data, 'Missing score field'
          assert data['label'] in ['POSITIVE', 'NEGATIVE'], 'Invalid label value'
          assert 0 <= float(data['score']) <= 1, 'Score out of range'
          print('Smoke test passed — model is responding correctly')
          "

      - name: Stop container
        if: always()
        run: docker stop smoke-test && docker rm smoke-test

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to Hugging Face Spaces
  #         Runs only after smoke-test passes
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          pip install huggingface_hub -q
          python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          api.upload_folder(
              folder_path='hf-space/',
              repo_id='$HF_USERNAME/$HF_SPACE_NAME',
              repo_type='space',
              token='$HF_TOKEN'
          )
          print('Deployed successfully to HF Space')
          "

  # ─────────────────────────────────────────────
  # JOB 3: Confirm the deployment is live
  # ─────────────────────────────────────────────
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for Space to rebuild
        run: sleep 90

      - name: Call health endpoint and confirm version
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          curl --fail \
               --retry 5 \
               --retry-delay 30 \
               --retry-connrefused \
               https://$HF_USERNAME-$HF_SPACE_NAME.hf.space/health
